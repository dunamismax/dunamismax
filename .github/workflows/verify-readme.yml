name: verify-readme

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scripts
        run: python -m compileall scripts

      - name: Verify generated README
        run: python scripts/generate_readme.py --check
