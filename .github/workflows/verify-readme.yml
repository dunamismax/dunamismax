name: verify-readme

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Verify generated README
        run: bun run readme:check
